{% extends "hello/base.html" %}
{% block content %}
<a href="{% url 'todo_list' %}" style="font-size:0.875rem;">&larr; Back to list</a>
<h1 style="margin-top:1rem;">{{ action }} Todo</h1>

<div class="card" style="display:block;margin-top:1.25rem;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" value="{{ todo.title|default:'' }}" required placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Optional details...">{{ todo.description|default:'' }}</textarea>
    </div>
    {% if todo %}
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="completed" name="completed" {% if todo.completed %}checked{% endif %}>
        <label for="completed" style="margin:0;">Mark as completed</label>
      </div>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ action }}</button>
      <a href="{% url 'todo_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
